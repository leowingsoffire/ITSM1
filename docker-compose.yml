services:
  db:
    image: postgres:16-alpine
    container_name: itsm1-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itsm
      POSTGRES_PASSWORD: itsm_dev_password
      POSTGRES_DB: itsm1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsm -d itsm1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: itsm1-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://itsm:itsm_dev_password@db:5432/itsm1?schema=public
      JWT_SECRET: dev-only-secret-change-in-production-32chars
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: itsm1-web
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - api

volumes:
  pgdata:
